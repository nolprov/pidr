[General]
network = src.FiveGNetwork
sim-time-limit = 600s
debug-on-errors = true
ned-path = ../src:../../simu5g-1.4.1/src:../../inet-4.5.4/src

# --- Planification Temps Réel ---
scheduler-class = "omnetpp::cRealTimeScheduler"
realtimescheduler-scaling = 1.0

# --- Configuration du Réseau IP ---
*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.assignAddresses = true
*.configurator.assignDispatchedRoutes = true
*.configurator.addStaticRoutes = true
*.configurator.addSubnetRoutes = true
*.configurator.addDefaultRoutes = true

# ---------------------------------------------------------
# Configuration des Statistiques (Modèle de base)
# ---------------------------------------------------------
[Config Statistics]
**.scalar-recording = true
**.vector-recording = true
**.channelModel = "UMA"
**.pathlossModel = "P3GPP38901"

# ---------------------------------------------------------
# Configuration du Scénario UPLINK (Hérite de Statistics)
# ---------------------------------------------------------
[Config Uplink-Professional]
extends = Statistics

# 1. FIXER LES PARAMÈTRES POUR ÉVITER LES POP-UPS
*.ue[*].masterId = 1
*.ue[*].macCellId = 1
*.ue[*].nrMasterId = 1
*.ue[*].nrMacCellId = 1

# 2. CONFIGURATION DU DTCONNECTOR (3 modules : ue0, ue1, gnb0)
*.dtConnector.numMobilityModules = 3
*.dtConnector.mobilityModulePaths = "ue[0].mobility,ue[1].mobility,gnb[0].mobility"
*.dtConnector.samplingInterval = 0.1s

# 3. RÉSEAU ET MOBILITÉ
*.numUe = 2
*.gnb[0].mobility.initialX = 500m
*.gnb[0].mobility.initialY = 500m
*.gnb[0].mobility.initialZ = 30m

# --- Configuration Mobilité UE 0 (Véhicule) ---
*.ue[0].mobility.typename = "LinearMobility"
*.ue[0].mobility.initialX = 510m
*.ue[0].mobility.initialY = 510m
*.ue[0].mobility.initialZ = 1.5m
*.ue[0].mobility.speed = 15mps
*.ue[0].mobility.angle = 90deg
*.ue[0].mobility.initFromDisplayString = false

# --- Configuration Mobilité UE 1 (Piéton - FIXÉ ICI) ---
*.ue[1].mobility.typename = "RandomWaypointMobility"
*.ue[1].mobility.initialX = 450m
*.ue[1].mobility.initialY = 450m
*.ue[1].mobility.initialZ = 1.5m
*.ue[1].mobility.speed = 1.5mps
# Paramètres de zone (Indispensables pour éviter le -nan)
*.ue[1].mobility.constraintAreaMinX = 300m
*.ue[1].mobility.constraintAreaMaxX = 700m
*.ue[1].mobility.constraintAreaMinY = 300m
*.ue[1].mobility.constraintAreaMaxY = 700m
*.ue[1].mobility.constraintAreaMinZ = 1.5m
*.ue[1].mobility.constraintAreaMaxZ = 1.5m
*.ue[1].mobility.waitTime = 0s
*.ue[1].mobility.initFromDisplayString = false

# 4. TRAFIC UPLINK
*.server.numApps = 2
*.ue[*].numApps = 1

*.ue[0].app[0].typename = "CbrSender"
*.ue[0].app[0].destAddress = "server"
*.ue[0].app[0].destPort = 1000
*.ue[0].app[0].packetSize = 1450B
*.ue[0].app[0].samplingTime = 0.01s

*.ue[1].app[0].typename = "CbrSender"
*.ue[1].app[0].destAddress = "server"
*.ue[1].app[0].destPort = 1001
*.ue[1].app[0].packetSize = 512B
*.ue[1].app[0].samplingTime = 0.2s

*.server.app[0].typename = "CbrReceiver"
*.server.app[0].localPort = 1000
*.server.app[1].typename = "CbrReceiver"
*.server.app[1].localPort = 1001