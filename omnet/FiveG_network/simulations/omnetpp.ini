[General]
network = src.FiveGNetwork
sim-time-limit = 200s
scheduler-class = "omnetpp::cRealTimeScheduler"

# --- Chemins ---
ned-path = ../src:../../simu5g-1.4.1/src:../../inet-4.5.4/src

# --- Config Réseau ---
*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.addDefaultRoutes = true

# ---------------------------------------------------------------------------
# BLINDAGE TOTAL ANTI-DIALOGUE ET ANTI-PORT (L'OPTION FINALE)
# ---------------------------------------------------------------------------
# IDs Réseau (Bloque les pop-ups MasterId)
**.masterId = 1
**.macCellId = 1
**.nrMasterId = 1
**.nrMacCellId = 1

# Paramètres de Mobilité (Bloque les pop-ups Z, StdDev, et Marges)
**.initialZ = 0m
**.mobility.initFromDisplayString = false
**.mobility.updateInterval = 0.1s
**.constraintAreaMinX = 0m
**.constraintAreaMaxX = 1000m
**.constraintAreaMinY = 0m
**.constraintAreaMaxY = 1000m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m
**.speedStdDev = 0mps
**.angleStdDev = 0deg
**.alpha = 0.5
**.margin = 10m

*.server.app[*].localPort = -1
*.ue[*].app[0].localPort = 1000
**.destPort = 1000

**.startTime = 1s
**.stopTime = -1s

# ---------------------------------------------------------------------------
# CONFIG STATISTICS
# ---------------------------------------------------------------------------
[Config Statistics]
**.channelModel = "UMA"
**.pathlossModel = "P3GPP38901"
**.transmitter.power = 0.1W
**.cellularNic.phy.receiver.noiseFigure = 5dB

# ---------------------------------------------------------------------------
# CONFIG DT-SCENARIO (10 UEs hétérogènes)
# ---------------------------------------------------------------------------
[Config DT-Scenario]
extends = Statistics

*.numUe = 10
*.numGnb = 1
*.numBgCells = 0

*.dtConnector.numMobilityModules = 11
*.dtConnector.samplingInterval = 0.1s
*.dtConnector.mobilityModulePaths = "ue[0].mobility,ue[1].mobility,ue[2].mobility,ue[3].mobility,ue[4].mobility,ue[5].mobility,ue[6].mobility,ue[7].mobility,ue[8].mobility,ue[9].mobility,gnb[0].mobility"

# --- POSITIONS ET MOBILITÉS VARIÉES ---
*.gnb[0].mobility.initialX = 500m
*.gnb[0].mobility.initialY = 500m

# UE 0-2 : Mobilité Linéaire (Piétons)
*.ue[0..2].mobility.typename = "LinearMobility"
*.ue[0..2].mobility.initialX = uniform(300m, 700m)
*.ue[0..2].mobility.initialY = uniform(300m, 700m)
*.ue[0..2].mobility.speed = 1.5mps
*.ue[0..2].mobility.angle = uniform(0deg, 360deg)

*.ue[3..5].mobility.typename = "GaussMarkovMobility"
*.ue[3..5].mobility.initialX = 500m
*.ue[3..5].mobility.initialY = 500m
*.ue[3..5].mobility.speed = 12mps

*.ue[6..8].mobility.typename = "RandomWaypointMobility"
*.ue[6..8].mobility.initialX = uniform(100m, 900m)
*.ue[6..8].mobility.initialY = uniform(100m, 900m)
*.ue[6..8].mobility.speed = uniform(5mps, 20mps)
*.ue[6..8].mobility.waitTime = 1s

*.ue[9].mobility.typename = "StationaryMobility"
*.ue[9].mobility.initialX = 550m
*.ue[9].mobility.initialY = 450m

*.server.numApps = 10
*.ue[*].numApps = 1

*.server.app[*].typename = "CbrSender"
*.server.app[0].destAddress = "ue[0]"
*.server.app[1].destAddress = "ue[1]"
*.server.app[2].destAddress = "ue[2]"
*.server.app[3].destAddress = "ue[3]"
*.server.app[4].destAddress = "ue[4]"
*.server.app[5].destAddress = "ue[5]"
*.server.app[6].destAddress = "ue[6]"
*.server.app[7].destAddress = "ue[7]"
*.server.app[8].destAddress = "ue[8]"
*.server.app[9].destAddress = "ue[9]"

*.server.app[0..3].packetSize = 1400B
*.server.app[0..3].samplingTime = 0.01s 

*.server.app[4..7].packetSize = 500B
*.server.app[4..7].samplingTime = 0.1s

*.server.app[8..9].packetSize = 64B
*.server.app[8..9].samplingTime = 1s  

# Tous les récepteurs sur les UEs
*.ue[*].app[0].typename = "CbrReceiver"

# --- SCENARIO MANAGER ---
