[General]
network = src.FiveGNetwork
sim-time-limit = 620s
debug-on-errors = true
ned-path = ../src:../../simu5g-1.4.1/src:../../inet-4.5.4/src

# --- Planification Temps Réel ---
scheduler-class = "omnetpp::cRealTimeScheduler"
realtimescheduler-scaling = 1.0

# --- Sorties des résultats ---
# output-scalar-file = results/${configname}.sca
# output-vector-file = results/${configname}.vec

# --- Configuration du Réseau IP (Indispensable pour éviter ICMP Unreachable) ---
*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.assignAddresses = true
*.configurator.assignDispatchedRoutes = true
*.configurator.addStaticRoutes = true
*.configurator.addSubnetRoutes = true

# ---------------------------------------------------------
# Configuration des Statistiques et Signaux
# ---------------------------------------------------------
[Config Statistics]
**.scalar-recording = true
**.vector-recording = true

# Modèle de canal 3GPP
**.channelModel = "UMA"
**.pathlossModel = "P3GPP38901"


# Enregistrement des vecteurs de mobilité
*.ue[*].mobility.x.vector = true
*.ue[*].mobility.y.vector = true
*.gnb.mobility.x.vector = true
*.gnb.mobility.y.vector = true

# ---------------------------------------------------------
# Configuration du DTConnector
# ---------------------------------------------------------
*.dtConnector.numMobilityModules = 5
*.dtConnector.mobilityModulePaths = "ue[0].mobility,ue[1].mobility,ue[2].mobility,ue[3].mobility,gnb[0].mobility"
*.dtConnector.samplingInterval = 0.1s

# ---------------------------------------------------------
# Configuration du Scénario 4 UEs
# ---------------------------------------------------------
[Config Four-UEs]
extends = Statistics

# Nombre d'UEs
*.numUe = 4

# Position du gNB (Centre)
*.gnb.mobility.initialX = 500m
*.gnb.mobility.initialY = 500m
*.gnb.mobility.initialZ = 0m

# Configuration des IDs Mac (LTE et NR)
*.ue[*].macCellId = 0
*.ue[*].masterId = 0
*.ue[*].nrMacCellId = 1
*.ue[*].nrMasterId = 1

# --- Configuration de la Mobilité ---
# UE 0 est le leader (mouvement linéaire)
*.ue[0].mobility.typename = "LinearMobility"
*.ue[0].mobility.speed = 5mps
*.ue[0].mobility.angle = 180deg
*.ue[0].mobility.initialX = 1900m
*.ue[0].mobility.initialY = 1700m
*.ue[0].mobility.initialZ = 0m
*.ue[0].mobility.initFromDisplayString = false

# UEs 1, 2, et 3 sont attachés à l'UE 0 (formation de groupe)
*.ue[1..3].mobility.typename = "AttachedMobility"
*.ue[1..3].mobility.mobilityModule = "^.^.ue[0].mobility"
*.ue[1].mobility.offsetX = 50m
*.ue[2].mobility.offsetY = 50m
*.ue[3].mobility.offsetY = -50m
*.ue[3].mobility.offsetHeading = 45deg

# --- Configuration des Applications (Trafic Downlink) ---
*.server.numApps = 4
*.ue[0].numApps = 1
*.ue[2].numApps = 1
*.ue[1].numApps = 1
*.ue[3].numApps = 1

*.ue[0].cellularNic.d2d.enable = true
*.ue[2].cellularNic.d2d.enable = true


# Côté Serveur : Envoi de données vers chaque UE
*.server.app[*].typename = "CbrSender"
*.server.app[0].destAddress = "ue[0]"
*.server.app[1].destAddress = "ue[1]"
*.server.app[2].destAddress = "ue[2]"
*.server.app[3].destAddress = "ue[3]"
*.server.app[*].localPort = 3088 + ancestorIndex(0)
*.server.app[*].destPort = 1000
*.server.app[*].packetSize = intWithUnit(max(64B, normal(1000B, 150B)))
#*.server.app[*].samplingTime = max(0.0001s, normal(0.001s, 0.0002s))
*.server.app[*].samplingTime = max(0.05s, normal(0.1s, 0.2s))
*.server.app[*].startTime = 0.1s

# Côté UEs : Réception des données
*.ue[*].app[0].typename = "CbrReceiver"
*.ue[*].app[0].localPort = 1000



*.configurator.addStaticRoutes = true
*.configurator.addSubnetRoutes = true
*.configurator.addDefaultRoutes = true


